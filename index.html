<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#00897b">
  <title>보험대리점 CBT FINAL v6</title>
  <link rel="stylesheet" href="style.css?v=6.0">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>보험대리점 CBT FINAL</h1>
        <p>생명보험 · 제3보험 · 공통 / 이미지 실전 암기장 v6</p>
      </div>
      <button id="themeBtn" class="iconBtn" aria-label="테마 변경">🌙</button>
    </header>

    <section id="home" class="panel">
      <div class="hero">
        <div>
          <h2>오늘은 이것만 계속 돌리자</h2>
          <p>문제는 이미지 그대로, 답은 버튼으로 빠르게. 틀린 문제는 자동으로 오답노트에 저장돼.</p>
        </div>
        <div class="miniStats">
          <div><strong id="totalCount">320</strong><span>전체</span></div>
          <div><strong id="wrongCount">0</strong><span>오답</span></div>
          <div><strong id="starCount">0</strong><span>별표</span></div>
        </div>
      </div>

      <div class="bigActions">
        <button id="startRandom50" class="primary">🔥 통합 랜덤 50문제</button>
        <button id="startExam40">📝 실전 랜덤 40문제</button>
        <button id="startAll">📚 전체 320문제</button>
        <button id="resumeBtn">⏯ 이어풀기</button>
        <button id="startWrong">❌ 오답만</button>
        <button id="startStar">⭐ 별표만</button>
      </div>

      <details class="options" open>
        <summary>세부 설정</summary>
        <div class="formGrid">
          <label>문제 수
            <select id="countSelect">
              <option value="20">20문제</option>
              <option value="40">40문제</option>
              <option value="50" selected>50문제</option>
              <option value="100">100문제</option>
              <option value="all">전체</option>
            </select>
          </label>
          <label>풀이 모드
            <select id="modeSelect">
              <option value="instant" selected>바로 채점 암기모드</option>
              <option value="exam">마지막 채점 시험모드</option>
            </select>
          </label>
          <label>출제 순서
            <select id="orderSelect">
              <option value="shuffle" selected>랜덤</option>
              <option value="order">자료 순서</option>
            </select>
          </label>
          <label>자동 넘김
            <select id="autoNextSelect">
              <option value="off">끄기</option>
              <option value="correct" selected>맞으면 자동</option>
              <option value="always">항상 자동</option>
            </select>
          </label>
        </div>

        <div class="quickFilters">
          <button id="checkAll" class="ghost">전체 선택</button>
          <button id="checkNone" class="ghost">전체 해제</button>
          <button id="check25" class="ghost">25년 모의고사</button>
          <button id="check26Mock" class="ghost">26년 쪽집게</button>
          <button id="checkExpected" class="ghost">26년 예상문제</button>
        </div>

        <div id="setFilters" class="chips"></div>
        <button id="startCustom" class="primary full">선택 범위로 시작</button>
      </details>

      <div class="tips">
        <b>단축키</b> 1~4번 답 선택 · ← 이전 · → 다음 · S 별표 · Enter 다음
      </div>
    </section>

    <section id="quiz" class="panel hidden">
      <div class="quizHead">
        <button id="exitBtn" class="ghost">← 나가기</button>
        <div class="progressText"><b id="nowNo">1</b> / <span id="totalNo">50</span></div>
        <div id="timer" class="timer">00:00</div>
      </div>

      <div class="progressBar"><div id="barFill"></div></div>

      <div class="questionMeta">
        <span id="sourcePill" class="pill">자료</span>
        <span id="localPill" class="pill muted">1번</span>
        <span id="answerPill" class="pill muted">정답 숨김</span>
        <button id="starBtn" class="iconBtn small">☆</button>
      </div>

      <div class="imageBox">
        <div id="imageLoading" class="imageLoading">문제 이미지 불러오는 중...</div>
        <img id="questionImg" alt="문제 이미지" draggable="false">
        <button id="zoomBtn" class="zoomBtn">확대</button>
      </div>

      <div id="choices" class="answerGrid"></div>

      <div id="feedback" class="feedback hidden"></div>

      <div class="navGrid">
        <button id="prevBtn" class="ghost">이전</button>
        <button id="revealBtn" class="ghost">정답 보기</button>
        <button id="nextBtn" class="primary">다음</button>
      </div>

      <details class="jumpBox">
        <summary>문제 번호 이동</summary>
        <div id="numPad" class="numPad"></div>
      </details>
    </section>

    <section id="result" class="panel hidden">
      <h2>채점 결과</h2>
      <div class="scoreBox"><strong id="scorePct">0</strong><span>점</span></div>
      <p id="scoreLine"></p>

      <div class="bigActions resultActions">
        <button id="retryWrongSession" class="primary">방금 틀린 문제만 다시</button>
        <button id="retrySame">같은 문제 다시</button>
        <button id="homeBtn">홈으로</button>
      </div>

      <h3>오답 확인</h3>
      <div id="reviewList" class="reviewList"></div>
    </section>
  </main>

  <div id="modal" class="modal hidden">
    <button id="closeModal" class="modalClose">×</button>
    <img id="modalImg" alt="확대 이미지">
  </div>

  <script src="questions.js?v=6.0"></script>
  <script src="app.js?v=6.0"></script>
</body>
</html>
