<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#00897b">
  <title>보험대리점 CBT v8</title>
  <link rel="stylesheet" href="./style.css?v=8">
</head>
<body>
  <main class="wrap">
    <header class="header">
      <div>
        <h1>보험대리점 CBT</h1>
        <p>생명보험 · 제3보험 · 공통 / 개인 학습용 v8 · 해설 포함</p>
      </div>
      <button id="theme" class="round">🌙</button>
    </header>

    <section id="home" class="card">
      <div class="dashboard">
        <div><b id="total">320</b><span>전체</span></div>
        <div><b id="wrongCount">0</b><span>오답</span></div>
        <div><b id="starCount">0</b><span>별표</span></div>
      </div>

      <div class="actions">
        <button id="random50" class="main">통합 랜덤 50문제</button>
        <button id="exam40">실전 랜덤 40문제</button>
        <button id="all">전체 320문제</button>
        <button id="wrong">오답만</button>
        <button id="starred">별표만</button>
        <button id="resume">이어풀기</button>
      </div>

      <details open>
        <summary>세부 설정</summary>
        <div class="settings">
          <label>문제 수
            <select id="count">
              <option value="20">20문제</option>
              <option value="40">40문제</option>
              <option value="50" selected>50문제</option>
              <option value="100">100문제</option>
              <option value="all">전체</option>
            </select>
          </label>
          <label>풀이 모드
            <select id="mode">
              <option value="instant" selected>바로 채점</option>
              <option value="exam">마지막 채점</option>
            </select>
          </label>
          <label>출제 순서
            <select id="order">
              <option value="shuffle" selected>랜덤</option>
              <option value="order">자료 순서</option>
            </select>
          </label>
          <label>자동 넘김
            <select id="auto">
              <option value="off">끄기</option>
              <option value="correct" selected>맞으면 자동</option>
              <option value="always">항상 자동</option>
            </select>
          </label>
        </div>
        <div class="filterBtns">
          <button id="fAll">전체</button>
          <button id="f25">25년 모의</button>
          <button id="f26">26년 쪽집게</button>
          <button id="fExpected">26년 예상</button>
        </div>
        <div id="sets" class="sets"></div>
        <button id="custom" class="main wide">선택 범위로 시작</button>
      </details>

      <p class="hint">단축키: 1~4 답 선택 · ← 이전 · →/Enter 다음 · S 별표</p>
    </section>

    <section id="quiz" class="card hidden">
      <div class="top">
        <button id="exit">← 나가기</button>
        <strong><span id="now">1</span> / <span id="max">50</span></strong>
        <span id="timer">00:00</span>
      </div>
      <div class="bar"><div id="bar"></div></div>

      <div class="meta">
        <span id="setName" class="pill"></span>
        <span id="localNo" class="pill mute"></span>
        <span id="answerState" class="pill mute">정답 숨김</span>
        <button id="starBtn" class="round small">☆</button>
      </div>

      <div class="imgBox">
        <div id="loading">이미지 불러오는 중...</div>
        <img id="qimg" alt="문제 이미지">
        <button id="zoom" class="zoom">확대</button>
      </div>

      <div id="answers" class="answers"></div>
      <div id="feedback" class="feedback hidden"></div>

      <div class="nav">
        <button id="prev">이전</button>
        <button id="showAnswer">정답 보기</button>
        <button id="next" class="main">다음</button>
      </div>

      <details class="jump">
        <summary>문제 번호 이동</summary>
        <div id="pad" class="pad"></div>
      </details>
    </section>

    <section id="result" class="card hidden">
      <h2>채점 결과</h2>
      <div class="score"><b id="score">0</b>점</div>
      <p id="scoreText"></p>
      <div class="actions">
        <button id="retryWrong" class="main">틀린 문제 다시</button>
        <button id="retrySame">같은 문제 다시</button>
        <button id="goHome">홈으로</button>
      </div>
      <h3>오답 목록</h3>
      <div id="review"></div>
    </section>
  </main>

  <div id="modal" class="modal hidden">
    <button id="close">×</button>
    <img id="modalImg" alt="확대 문제">
  </div>

  <script src="./questions.js?v=8"></script>
  <script src="./app.js?v=8"></script>
</body>
</html>
